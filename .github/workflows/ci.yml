name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Check imports
        run: |
          python -c "from pipeline.core.models import ContentItem; print('Models OK')"
          python -c "from pipeline.core.config import settings; print('Config OK')"
          python -c "from pipeline.pipeline.classifier import classify_item, TOPIC_KEYWORDS; print(f'Classifier OK ({len(TOPIC_KEYWORDS)} topics)')"

      - name: Test classifier
        run: |
          python -c "
          from pipeline.core.models import ContentItem
          from pipeline.pipeline.classifier import classify_item, TOPIC_KEYWORDS
          tests = {
            'AgenticAI': 'Claude Code and Cursor for AI agent coding with tool use',
            'RAG': 'Pinecone vector database for RAG retrieval augmented generation',
            'MCP': 'Model Context Protocol server for MCP tool integration',
            'Semiconductors': 'RISC-V architecture and NVIDIA CUDA for chip design',
          }
          for topic, content in tests.items():
              item = ContentItem(id='test', title=topic, content=content, source='test')
              ci = classify_item(item, method='keyword')
              assert topic in ci.topics, f'Failed: {topic} not in {ci.topics}'
          print(f'All {len(tests)} classifier tests passed')
          "

      - name: Test API imports
        run: |
          python -c "
          from pipeline.api.main import app
          routes = [(r.methods, r.path) for r in app.routes if hasattr(r, 'path')]
          print(f'API has {len(routes)} routes')
          project_routes = [r for r in routes if 'project' in (r[1] or '').lower()]
          campaign_routes = [r for r in routes if 'campaign' in (r[1] or '').lower()]
          print(f'  {len(project_routes)} project routes')
          print(f'  {len(campaign_routes)} campaign routes')
          "

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Type check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: ./frontend
        run: npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install lint tools
        run: pip install ruff

      - name: Lint Python
        run: ruff check pipeline/ --ignore=E402,F811,F401 --quiet || true

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ai-content-hub:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
